<!DOCTYPE html>

                        <input type="color" id="color-14-a" value="#0d9488" onchange="update141Color('a')" class="w-5 h-5 border-0 cursor-pointer p-0 bg-transparent">

                                <button onclick="changeCurrentStat('current-fouls-b', 1)" class="bg-rose-100 text-rose-700 w-8 h-8 rounded-full font-bold text-lg flex items-center justify-center hover:bg-rose-200">+</button>

        <section id="page-records" class="page space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-folder-open text-emerald-600"></i> 練習紀錄管理
                </h2>
                <button onclick="openRecordModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md transition text-xl">

    <div id="record-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 space-y-4">
            <h3 class="text-lg font-bold text-gray-800">新增練習紀錄</h3>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">練習標題</label>
                <input type="text" id="modal-title" placeholder="例如：作球走位練習" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">上傳照片（選填）</label>
                <input type="file" id="modal-file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
            </div>
            <div class="flex justify-end gap-3 pt-2">
                <button onclick="closeRecordModal()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm transition">取消</button>
                <button onclick="saveRecord()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm transition">確認新增</button>
            </div>
        </div>
    </div>

    <script>
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            const targetPage = document.getElementById(`page-${pageId}`);
            if (targetPage) targetPage.classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-slate-700', 'font-medium', 'text-white');
                btn.classList.add('text-slate-300');
            });
            
            const clickedBtn = document.querySelector(`button[onclick="switchPage('${pageId}')"]`);
            if (clickedBtn) {
                clickedBtn.classList.add('bg-slate-700', 'font-medium', 'text-white');
                clickedBtn.classList.remove('text-slate-300');
            }
            
            if (window.innerWidth < 768) {
                document.getElementById('nav-menu').classList.add('hidden');
            }
        }

        document.getElementById('menu-toggle').addEventListener('click', () => {
            document.getElementById('nav-menu').classList.toggle('hidden');
        });

        function editPlayerName(id) {
            const el = document.getElementById(id);
            const currentName = el.innerText;
            const newName = prompt("請輸入自訂的選手名稱：", currentName);
            if (newName !== null && newName.trim() !== "") {
                el.innerText = newName.trim();
            }
        }

        function changeScore(id, val) {
            const el = document.getElementById(id);
            let current = parseInt(el.innerText) || 0;
            current += val;
            if (current < 0) current = 0;
            el.innerText = current;
        }

        function updateGenericColor(gameType, player) {
            const hexColor = document.getElementById(`color-${gameType}-${player}`).value;
            document.getElementById(`score${gameType}-${player}`).style.color = hexColor;
            document.getElementById(`btn-plus-${gameType}-${player}`).style.backgroundColor = hexColor;
        }

        function reset9Ball() {
            document.getElementById('score9-a').innerText = '0';
            document.getElementById('score9-b').innerText = '0';
            document.getElementById('name-9-a').innerText = 'A';
            document.getElementById('name-9-b').innerText = 'B';
            document.getElementById('color-9-a').value = '#4f46e5';
            document.getElementById('color-9-b').value = '#e11d48';
            updateGenericColor('9', 'a');
            updateGenericColor('9', 'b');
        }

        function reset8Ball() {
            document.getElementById('score8-a').innerText = '0';
            document.getElementById('score8-b').innerText = '0';
            document.getElementById('name-8-a').innerText = 'A';
            document.getElementById('name-8-b').innerText = 'B';
            document.getElementById('color-8-a').value = '#9333ea';
            document.getElementById('color-8-b').value = '#d97706';
            updateGenericColor('8', 'a');
            updateGenericColor('8', 'b');
        }

        function changeCurrentStat(id, val) {
            const el = document.getElementById(id);
            let current = parseInt(el.innerText) || 0;
            current += val;
            if (current < 0) current = 0; 
            el.innerText = current;
        }

        function update141Color(player) {
            const hexColor = document.getElementById(`color-14-${player}`).value;
            document.getElementById(`score14-${player}`).style.color = hexColor;
            const plusBtn = document.getElementById(`btn-plus-ball-${player}`);
            plusBtn.style.color = hexColor;
            plusBtn.style.backgroundColor = hexColor + "1a"; 
        }

        function calculateAll141() {
            ['a', 'b'].forEach(player => {
                const scoreEl = document.getElementById(`score14-${player}`);
                const ballsEl = document.getElementById(`current-balls-${player}`);
                const foulsEl = document.getElementById(`current-fouls-${player}`);

                let totalScore = parseInt(scoreEl.innerText) || 0;
                let currentBalls = parseInt(ballsEl.innerText) || 0;
                let currentFouls = parseInt(foulsEl.innerText) || 0;

                totalScore = totalScore + currentBalls - currentFouls;
                scoreEl.innerText = totalScore;

                ballsEl.innerText = '0';
                foulsEl.innerText = '0';
            });
        }

        function reset141() {
            document.getElementById('score14-a').innerText = '0';
            document.getElementById('score14-b').innerText = '0';
            document.getElementById('current-balls-a').innerText = '0';
            document.getElementById('current-balls-b').innerText = '0';
            document.getElementById('current-fouls-a').innerText = '0';
            document.getElementById('current-fouls-b').innerText = '0';
            document.getElementById('name-14-a').innerText = 'A';
            document.getElementById('name-14-b').innerText = 'B';
            
            document.getElementById('color-14-a').value = '#0d9488';
            document.getElementById('color-14-b').value = '#ea580c';
            update141Color('a');
            update141Color('b');
        }

        function openRecordModal() {
            document.getElementById('record-modal').classList.remove('hidden');
        }

        function closeRecordModal() {
            document.getElementById('record-modal').classList.add('hidden');
            document.getElementById('modal-title').value = '';
            document.getElementById('modal-file').value = '';
        }

        function loadRecords() {
            const grid = document.getElementById('records-grid');
            grid.innerHTML = ''; 
            
            const records = JSON.parse(localStorage.getItem('billiard_records')) || [];
            
            records.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden relative group";
                
                let imgHtml = `
                    <div class="bg-gray-200 h-48 flex items-center justify-center text-gray-400 border-b border-gray-200">
                        <i class="fa-regular fa-image text-4xl"></i>
                    </div>`;
                
                if (item.image) {
                    imgHtml = `
                        <div class="h-48 overflow-hidden border-b border-gray-200">
                            <img src="${item.image}" class="w-full h-full object-cover">
                        </div>`;
                }
                
                card.innerHTML = `
                    ${imgHtml}
                    <div class="p-4 flex justify-between items-center bg-gray-50">
                        <span class="font-medium text-gray-700">${item.title}</span>
                        <button onclick="deleteRecord(${index})" class="text-red-400 hover:text-red-600 p-1"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function saveRecord() {
            const title = document.getElementById('modal-title').value.trim();
            if (!title) {
                alert('請輸入練習標題！');
                return;
            }

            const fileInput = document.getElementById('modal-file');
            const records = JSON.parse(localStorage.getItem('billiard_records')) || [];

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    records.push({ title: title, image: e.target.result });
                    localStorage.setItem('billiard_records', JSON.stringify(records));
                    loadRecords();
                    closeRecordModal();
                }
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                records.push({ title: title, image: null });
                localStorage.setItem('billiard_records', JSON.stringify(records));
                loadRecords();
                closeRecordModal();
            }
        }

        function deleteRecord(index) {
            const records = JSON.parse(localStorage.getItem('billiard_records')) || [];
            records.splice(index, 1);
            localStorage.setItem('billiard_records', JSON.stringify(records));
            loadRecords();
        }

        window.onload = function() {
            reset9Ball();
            reset8Ball();
            reset141();
            loadRecords();
        };
    </script>
</body>
</html>
