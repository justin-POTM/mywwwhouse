<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚾ 經典九局棒球卡牌賽 ⚾</title>
    <style>
        body { background-color: #1a252f; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .game-wrapper { max-width: 800px; margin: 0 auto; background: #2c3e50; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h1 { color: #f1c40f; margin-top: 0; text-shadow: 2px 2px #000; }
        
        /* 記分板樣式 */
        .scoreboard { width: 100%; border-collapse: collapse; background: #111; color: #00ff00; font-family: 'Courier New', monospace; font-size: 18px; margin-bottom: 20px; border: 3px solid #7f8c8d; }
        .scoreboard th, .scoreboard td { border: 1px solid #444; padding: 8px; text-align: center; }
        .scoreboard th { background: #222; color: #bdc3c7; }
        .active-inning { color: #fff; background: #c0392b; font-weight: bold; }

        /* 球場與狀態雙欄佈局 */
        .game-layout { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        
        /* BSO 燈號區 */
        .bso-panel { flex: 1; min-width: 250px; background: #111; border: 3px solid #7f8c8d; border-radius: 10px; padding: 15px; text-align: left; box-sizing: border-box; }
        .bso-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 20px; font-weight: bold; }
        .bso-label { width: 30px; font-family: monospace; }
        .dot { width: 18px; height: 18px; border-radius: 50%; background: #333; margin-left: 8px; display: inline-block; border: 1px solid #fff; }
        .dot.ball { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .dot.strike { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
        .dot.out { background: #ff0000; box-shadow: 0 0 8px #ff0000; }

        /* 綠色棒球場壘包視覺化 */
        .baseball-field { flex: 1.2; min-width: 300px; height: 260px; background: #27ae60; border: 5px solid #1e824c; border-radius: 10px; position: relative; box-sizing: border-box; }
        .diamond { width: 120px; height: 120px; border: 2px dashed #fff; position: absolute; top: 65px; left: 50%; transform: translateX(-50%) rotate(45deg); }
        .base { width: 22px; height: 22px; background: #fff; border: 2px solid #333; position: absolute; transform: rotate(-45deg); transition: background 0.3s; }
        .base.occupied { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; border-color: #fff; }
        #base1 { top: -11px; right: -11px; } /* 一壘 */
        #base2 { top: -11px; left: -11px; }  /* 二壘 */
        #base3 { bottom: -11px; left: -11px; } /* 三壘 */
        .home-plate { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #fff; font-weight: bold; background: #1e824c; padding: 2px 8px; border-radius: 4px; }

        /* 卡牌與控制區 */
        .control-panel { background: #34495e; padding: 20px; border-radius: 10px; border: 2px solid #455a64; }
        .card-zone { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 15px 0; }
        .card { width: 150px; height: 210px; background: #f39c12; border: 5px solid #fff; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: #2c3e50; font-size: 22px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .card.empty { background: #7f8c8d; color: #bdc3c7; border-color: #bdc3c7; }
        
        button { padding: 12px 28px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #2ecc71; color: white; box-shadow: 0 4px #27ae60; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #27ae60; }
        .btn-shuffle { background: #3498db; box-shadow: 0 4px #2980b9; }
        .game-log { margin-top: 15px; font-size: 18px; color: #f1c40f; min-height: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1>⚾ 經典九局棒球卡牌對抗賽 ⚾</h1>

        <table class="scoreboard">
            <thead>
                <tr>
                    <th width="150">球隊</th>
                    <th id="i1">1</th><th id="i2">2</th><th id="i3">3</th><th id="i4">4</th><th id="i5">5</th>
                    <th id="i6">6</th><th id="i7">7</th><th id="i8">8</th><th id="i9">9</th>
                    <th width="50">R</th><th width="50">H</th><th width="50">E</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="color: #3498db; font-weight: bold;">客隊 (AI)</td>
                    <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td>
                    <td id="away-R">0</td><td id="away-H">0</td><td>0</td>
                </tr>
                <tr style="background: #151515;">
                    <td style="color: #2ecc71; font-weight: bold;">主隊 (玩家)</td>
                    <td id="h1">-</td><td id="h2">-</td><td id="h3">-</td><td id="h4">-</td><td id="h5">-</td>
                    <td id="h6">-</td><td id="h7">-</td><td id="h8">-</td><td id="h9">-</td>
                    <td id="home-R">0</td><td id="home-H">0</td><td>0</td>
                </tr>
            </tbody>
        </table>

        <div class="game-layout">
            <div class="bso-panel">
                <div style="color: #bdc3c7; font-size: 14px; margin-bottom: 10px; text-align: center;" id="game-status-text">第 1 局下半 • 玩家進攻</div>
                <div class="bso-row">
                    <span class="bso-label" style="color: #00ff00;">B</span>
                    <div id="b1" class="dot"></div><div id="b2" class="dot"></div><div id="b3" class="dot"></div>
                </div>
                <div class="bso-row">
                    <span class="bso-label" style="color: #ffcc00;">S</span>
                    <div id="s1" class="dot"></div><div id="s2" class="dot"></div>
                </div>
                <div class="bso-row">
                    <span class="bso-label" style="color: #ff0000;">O</span>
                    <div id="o1" class="dot"></div><div id="o2" class="dot"></div>
                </div>
                <div style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; color: #aaa; font-size: 14px;">
                    <div>牌堆剩餘：<span id="deck-count" style="color:#fff;">36</span> 張</div>
                </div>
            </div>

            <div class="baseball-field">
                <div class="diamond">
                    <div id="base1" class="base"></div> <div id="base2" class="base"></div> <div id="base3" class="base"></div> </div>
                <div class="home-plate">本壘打擊區</div>
            </div>
        </div>

        <div class="control-panel">
            <div class="card-zone">
                <div id="current-card" class="card empty"><span>請抽牌</span></div>
            </div>
            <button id="main-btn" onclick="playTurn()">🎰 揮棒抽牌！</button>
            <button class="btn-shuffle" onclick="resetGame()" style="margin-left: 10px; background: #e74c3c;">🔄 重開一局</button>
            <div id="game-log" class="game-log">點擊按鈕開始比賽！</div>
        </div>
    </div>

    <script>
        // 經典棒球卡牌 36 張配置
        const baseCards = [
            ...Array(10).fill("一壘安打"), ...Array(4).fill("二壘安打"),
            ...Array(1).fill("三壘安打"), ...Array(2).fill("全壘打"),
            ...Array(4).fill("四壞保送"), ...Array(6).fill("出局"),
            ...Array(6).fill("好球"),     ...Array(3).fill("壞球")
        ];

        let deck = [];
        let score = { away: Array(9).fill(0), home: Array(9).fill(null) };
        let stats = { awayH: 0, homeH: 0, awayR: 0, homeR: 0 };
        
        let currentInning = 1; 
        let isTopInning = false; // 模擬玩家進攻（固定為下半局，上半局自動生成比分）
        
        let balls = 0, strikes = 0, outs = 0;
        let bases = [false, false, false]; // [一壘, 二壘, 三壘]

        function shuffle() {
            deck = [...baseCards];
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            updateUI();
        }

        function updateUI() {
            // 更新 BSO 燈號
            for(let i=1; i<=3; i++) document.getElementById(`b${i}`).className = i <= balls ? 'dot ball' : 'dot';
            for(let i=1; i<=2; i++) document.getElementById(`s${i}`).className = i <= strikes ? 'dot strike' : 'dot';
            for(let i=1; i<=2; i++) document.getElementById(`o${i}`).className = i <= outs ? 'dot out' : 'dot';

            // 更新壘包視覺
            document.getElementById('base1').className = bases[0] ? 'base occupied' : 'base';
            document.getElementById('base2').className = bases[1] ? 'base occupied' : 'base';
            document.getElementById('base3').className = bases[2] ? 'base occupied' : 'base';

            // 更新記分板
            let totalAwayR = 0, totalHomeR = 0;
            for(let i=1; i<=9; i++) {
                document.getElementById(`i${i}`).className = (i === currentInning) ? 'active-inning' : '';
                
                // 上半局（客隊AI）
                totalAwayR += score.away[i-1];
                
                // 下半局（主隊玩家）
                let hCell = document.getElementById(`h${i}`);
                if (score.home[i-1] === null) {
                    hCell.innerText = '-';
                } else {
                    hCell.innerText = score.home[i-1];
                    totalHomeR += score.home[i-1];
                }
            }
            stats.awayR = totalAwayR;
            stats.homeR = totalHomeR;
            document.getElementById('away-R').innerText = totalAwayR;
            document.getElementById('home-R').innerText = totalHomeR;
            document.getElementById('away-H').innerText = stats.awayH;
            document.getElementById('home-H').innerText = stats.homeH;
            document.getElementById('deck-count').innerText = deck.length;
            
            document.getElementById('game-status-text').innerText = `第 ${currentInning} 局下半 • 玩家進攻中`;
        }

        function log(msg) {
            document.getElementById('game-log').innerText = msg;
        }

        function resetCount() {
            balls = 0;
            strikes = 0;
            updateUI();
        }

        function triggerScore(runs) {
            if (runs > 0) {
                score.home[currentInning-1] += runs;
                log(`🎉 💥 跑者回本壘！得到 ${runs} 分！`);
            }
        }

        function advanceBases(numBases) {
            let runs = 0;
            stats.homeH += 1; // 增加安打數
            
            // 根據安打類型推展壘包
            for (let i = 0; i < numBases; i++) {
                if (bases[2]) { runs++; bases[2] = false; }
                if (bases[1]) { bases[2] = true; bases[1] = false; }
                if (bases[0]) { bases[1] = true; bases[0] = false; }
                if (i === 0) { bases[numBases-1] = true; }
            }
            triggerScore(runs);
            resetCount();
        }

        function walk() {
            log("🚶 四壞球保送！擠上壘包");
            let runs = 0;
            if (bases[0] && bases[1] && bases[2]) { runs++; }
            if (bases[0] && bases[1]) { bases[2] = true; }
            if (bases[0]) { bases[1] = true; }
            bases[0] = true;
            triggerScore(runs);
            resetCount();
        }

        function handleOut() {
            outs++;
            resetCount();
            if (outs >= 3) {
                log(`❌ 三人出局！第 ${currentInning} 局下半結束。`);
                nextInning();
            }
        }

        function playTurn() {
            if (currentInning > 9) return;
            if (deck.length === 0) shuffle();

            const card = deck.pop();
            const cardEl = document.getElementById('current-card');
            cardEl.className = "card";
            cardEl.innerHTML = `<span>${card}</span>`;

            if (score.home[currentInning-1] === null) score.home[currentInning-1] = 0;

            switch(card) {
                case "一壘安打":
                    log("⚡ 擊出一壘安打！全體前進一個壘包。");
                    advanceBases(1);
                    break;
                case "二壘安打":
                    log("🔥 🚀 擊出二壘安打！連衝兩個壘包！");
                    advanceBases(2);
                    break;
                case "三壘安打":
                    log("💥 🚀 🚀 驚天三壘安打！清空前半部壘包！");
                    advanceBases(3);
                    break;
                case "全壘打":
                    log("🚀 😱 外野再見啦！全壘打！！！全場歡呼！");
                    let runs = (bases[0]?1:0) + (bases[1]?1:0) + (bases[2]?1:0) + 1;
                    bases = [false, false, false];
                    stats.homeH += 1;
                    triggerScore(runs);
                    resetCount();
                    break;
                case "四壞保送":
                    walk();
                    break;
                case "好球":
                    strikes++;
                    log("⚾ 投手投出好球！進攻方記一好球。");
                    if (strikes >= 3) {
                        log("☠️ 三振出局！！！");
                        handleOut();
                    }
                    break;
                case "壞球":
                    balls++;
                    log("🟢 壞球偏低。");
                    if (balls >= 4) {
                        walk();
                    }
                    break;
                case "出局":
                    log("⚾ 擊出高飛球被接殺/內野滾地球刺殺。");
                    handleOut();
                    break;
            }
            updateUI();
        }

        function nextInning() {
            // 清空壘包與出局數
            bases = [false, false, false];
            outs = 0;
            resetCount();
            
            currentInning++;
            if (currentInning > 9) {
                // 比賽結束判定
                let resultText = "";
                if (stats.homeR > stats.awayR) resultText = "🏆 比賽結束！玩家獲勝！";
                else if (stats.homeR < stats.awayR) resultText = "😭 比賽結束！AI 獲勝！";
                else resultText = "🤝 九局激戰平手！";
                
                log(resultText);
                document.getElementById('game-status-text').innerText = "🏁 比賽結束";
                document.getElementById('main-btn').disabled = true;
                document.getElementById('main-btn').innerText = "🏁 賽事已結束";
            } else {
                updateUI();
            }
        }

        function resetGame() {
            // 模擬隨機生成 1-9 局客隊 AI 的分數
            for(let i=0; i<9; i++) {
                score.away[i] = Math.floor(Math.random() * 3) === 1 ? Math.floor(Math.random() * 2) + 1 : 0;
                score.home[i] = null;
            }
            stats.awayH = Math.floor(Math.random() * 6) + 4;
            stats.homeH = 0;
            currentInning = 1;
            bases = [false, false, false];
            balls = 0; strikes = 0; outs = 0;
            document.getElementById('main-btn').disabled = false;
            document.getElementById('main-btn').innerText = "🎰 揮棒抽牌！";
            shuffle();
            log("⚾ 新比賽開始！你是主隊，請在下半局迎頭趕上 AI 的分數吧！");
        }

        // 初始化
        resetGame();
    </script>
</body>
</html>
